<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내공상자 주간 추천 v4</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif; background: #F0F2F5; color: #1a1a1a; font-size: 14px; min-height: 100vh; }

/* 상단 헤더 */
.header { background: #fff; border-bottom: 1px solid #E5E7EB; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.header-left h1 { font-size: 16px; font-weight: 700; color: #111; }
.header-left p { font-size: 12px; color: #9CA3AF; margin-top: 1px; }
.week-badge { font-size: 12px; padding: 4px 12px; background: #F3F4F6; border-radius: 20px; color: #6B7280; font-weight: 500; }

/* API 설정 바 */
.api-bar { background: #fff; border-bottom: 1px solid #E5E7EB; padding: 10px 24px; display: flex; align-items: center; gap: 12px; }
.api-bar label { font-size: 11px; font-weight: 600; color: #6B7280; white-space: nowrap; }
.api-bar input { border: 1px solid #D1D5DB; border-radius: 6px; padding: 6px 10px; font-size: 12px; outline: none; font-family: inherit; flex: 1; max-width: 360px; }
.api-bar input:focus { border-color: #6366F1; }
.api-bar input.ok { border-color: #10B981; background: #F0FDF4; }
.api-hint { font-size: 11px; color: #9CA3AF; }
.api-hint a { color: #6366F1; text-decoration: none; }

/* 테마 + 액션 바 */
.action-bar { background: #fff; border-bottom: 1px solid #E5E7EB; padding: 12px 24px; display: flex; align-items: center; gap: 12px; }
.theme-wrap { display: flex; align-items: center; gap: 8px; flex: 1; }
.theme-wrap label { font-size: 12px; font-weight: 600; color: #374151; white-space: nowrap; }
.theme-input { border: 1.5px solid #6366F1; border-radius: 8px; padding: 8px 14px; font-size: 14px; outline: none; font-family: inherit; flex: 1; max-width: 320px; }
.theme-input:focus { box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
.btn-generate-mail { background: #4F46E5; color: #fff; border: none; border-radius: 8px; padding: 9px 20px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; white-space: nowrap; }
.btn-generate-mail:disabled { background: #D1D5DB; color: #9CA3AF; cursor: not-allowed; }
.progress-pills { display: flex; gap: 6px; }
.pill { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; border: 1.5px solid; }
.pill.g12 { background: #F0FDF4; border-color: #86EFAC; color: #166534; }
.pill.g34 { background: #EFF6FF; border-color: #93C5FD; color: #1E40AF; }
.pill.g56 { background: #FFF7ED; border-color: #FCD34D; color: #92400E; }
.pill.done { opacity: 1; }
.pill.pending { opacity: 0.45; }

/* 메인 컨텐츠 */
.main { padding: 16px 24px; }

/* 3컬럼 그리드 */
.grade-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 16px; }

/* 학년 카드 */
.grade-card { background: #fff; border-radius: 12px; border: 1px solid #E5E7EB; overflow: hidden; display: flex; flex-direction: column; }
.grade-card-header { padding: 12px 14px 10px; border-bottom: 1px solid #F3F4F6; }
.grade-card-header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.grade-title { font-size: 13px; font-weight: 700; }
.g12 .grade-title { color: #166534; }
.g34 .grade-title { color: #1E40AF; }
.g56 .grade-title { color: #92400E; }
.sel-count { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; }
.g12 .sel-count { background: #DCFCE7; color: #166534; }
.g34 .sel-count { background: #DBEAFE; color: #1E40AF; }
.g56 .sel-count { background: #FEF3C7; color: #92400E; }
.grade-card-header-bottom { display: flex; gap: 6px; }
.search-box { flex: 1; border: 1px solid #E5E7EB; border-radius: 6px; padding: 5px 8px; font-size: 12px; outline: none; font-family: inherit; }
.search-box:focus { border-color: #A5B4FC; }
.btn-ai { font-size: 11px; font-weight: 600; padding: 5px 10px; border-radius: 6px; border: none; cursor: pointer; font-family: inherit; white-space: nowrap; }
.g12 .btn-ai { background: #22C55E; color: #fff; }
.g34 .btn-ai { background: #3B82F6; color: #fff; }
.g56 .btn-ai { background: #F59E0B; color: #fff; }
.btn-ai:disabled { background: #D1D5DB !important; color: #9CA3AF !important; cursor: not-allowed; }
.btn-ai.loading { opacity: 0.7; }

/* 선택된 콘텐츠 영역 */
.selected-area { padding: 10px 12px; border-bottom: 1px solid #F3F4F6; min-height: 60px; }
.selected-area-label { font-size: 10px; font-weight: 600; color: #9CA3AF; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
.selected-item { border-radius: 8px; padding: 8px 10px; margin-bottom: 6px; position: relative; }
.g12 .selected-item { background: #F0FDF4; border: 1px solid #86EFAC; }
.g34 .selected-item { background: #EFF6FF; border: 1px solid #93C5FD; }
.g56 .selected-item { background: #FFF7ED; border: 1px solid #FCD34D; }
.selected-item-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 4px; margin-bottom: 5px; }
.selected-item-title { font-size: 12px; font-weight: 600; line-height: 1.4; flex: 1; }
.g12 .selected-item-title { color: #166534; }
.g34 .selected-item-title { color: #1E40AF; }
.g56 .selected-item-title { color: #92400E; }
.btn-remove { background: none; border: none; cursor: pointer; font-size: 14px; color: #9CA3AF; padding: 0; line-height: 1; flex-shrink: 0; }
.btn-remove:hover { color: #EF4444; }
.item-series { font-size: 10px; color: #9CA3AF; margin-bottom: 4px; }
.desc-textarea { width: 100%; border: 1px solid #D1D5DB; border-radius: 5px; padding: 5px 7px; font-size: 11px; line-height: 1.6; resize: vertical; min-height: 54px; font-family: inherit; color: #374151; background: #fff; outline: none; }
.desc-textarea:focus { border-color: #6366F1; }
.ai-status { font-size: 10px; margin-top: 3px; }
.ai-status.loading { color: #6366F1; }
.ai-status.done { color: #059669; }
.empty-selected { font-size: 11px; color: #D1D5DB; text-align: center; padding: 8px 0; }

/* 콘텐츠 목록 */
.content-list { flex: 1; overflow-y: auto; max-height: 340px; padding: 8px; }
.content-item { display: flex; align-items: flex-start; gap: 7px; padding: 7px 8px; border-radius: 7px; cursor: pointer; transition: background 0.1s; border: 1px solid transparent; margin-bottom: 3px; }
.content-item:hover { background: #F9FAFB; border-color: #E5E7EB; }
.content-item.selected-in-list { opacity: 0.35; cursor: default; }
.topic-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.topic-인문 { background: #818CF8; }
.topic-과학 { background: #34D399; }
.topic-사회 { background: #FB923C; }
.topic-감성 { background: #C084FC; }
.topic-진로 { background: #60A5FA; }
.topic-수행 { background: #F87171; }
.content-item-right { flex: 1; min-width: 0; }
.content-item-title { font-size: 12px; font-weight: 500; color: #111; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.content-item-meta { font-size: 10px; color: #9CA3AF; margin-top: 1px; display: flex; gap: 5px; }
.topic-label { font-size: 10px; font-weight: 600; padding: 1px 5px; border-radius: 4px; }
.topic-label.topic-인문 { background: #EEF2FF; color: #4338CA; }
.topic-label.topic-과학 { background: #ECFDF5; color: #065F46; }
.topic-label.topic-사회 { background: #FFF7ED; color: #9A3412; }
.topic-label.topic-감성 { background: #FDF4FF; color: #7E22CE; }
.topic-label.topic-진로 { background: #EFF6FF; color: #1D4ED8; }
.topic-label.topic-수행 { background: #FFF1F2; color: #9F1239; }
.show-more-btn { width: 100%; padding: 6px; font-size: 11px; color: #9CA3AF; background: none; border: none; border-top: 1px solid #F3F4F6; cursor: pointer; font-family: inherit; }
.show-more-btn:hover { color: #374151; background: #F9FAFB; }

/* xlsx 업로드 */
.upload-row { display: flex; align-items: center; gap: 8px; padding: 8px 24px; background: #FFFBEB; border-bottom: 1px solid #FDE68A; }
.upload-row p { font-size: 12px; color: #92400E; }
.btn-upload { font-size: 11px; padding: 4px 12px; border: 1px solid #F59E0B; border-radius: 5px; background: #fff; cursor: pointer; color: #92400E; font-family: inherit; }
.upload-done { background: #F0FDF4; border-color: #86EFAC; }
.upload-done p { color: #166534; }

/* 메일 결과 */
.mail-section { background: #fff; border-radius: 12px; border: 1px solid #E5E7EB; padding: 16px; margin-top: 0; }
.mail-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.mail-header h3 { font-size: 14px; font-weight: 700; }
.btn-copy { font-size: 12px; padding: 5px 14px; border: 1px solid #D1D5DB; border-radius: 6px; background: #fff; cursor: pointer; font-family: inherit; }
.btn-copy:hover { background: #F9FAFB; }
.mail-body { white-space: pre-wrap; font-size: 13px; line-height: 1.85; color: #374151; background: #F9FAFB; border-radius: 8px; padding: 14px 16px; }

/* 데이터 소스 선택 */
.source-bar { background: #fff; border-bottom: 1px solid #E5E7EB; padding: 10px 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.source-tabs { display: flex; gap: 6px; }
.source-tab { font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 6px; border: 1.5px solid #E5E7EB; background: #fff; cursor: pointer; color: #6B7280; font-family: inherit; transition: all 0.15s; }
.source-tab.active { background: #EEF2FF; border-color: #6366F1; color: #4338CA; }
.source-input-wrap { display: flex; align-items: center; gap: 8px; flex: 1; }
.source-input { border: 1px solid #D1D5DB; border-radius: 6px; padding: 6px 10px; font-size: 12px; outline: none; font-family: inherit; flex: 1; max-width: 420px; }
.source-input:focus { border-color: #6366F1; }
.btn-load { font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 6px; border: none; background: #6366F1; color: #fff; cursor: pointer; font-family: inherit; white-space: nowrap; }
.btn-load:hover { background: #4F46E5; }
.source-status { font-size: 12px; color: #059669; font-weight: 500; }
.source-status.error { color: #DC2626; }

/* 로딩 오버레이 */
.loading-overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.8); display: flex; align-items: center; justify-content: center; border-radius: 12px; font-size: 12px; color: #6366F1; font-weight: 600; z-index: 10; }
.grade-card { position: relative; }
</style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <div class="header-left">
    <h1>🎯 내공상자 주간 추천</h1>
    <p>운영중 · 공통/초등 · 학년별 2개씩 총 6개</p>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="progress-pills">
      <span class="pill g12 pending" id="pill-12">1~2학년 0/2</span>
      <span class="pill g34 pending" id="pill-34">3~4학년 0/2</span>
      <span class="pill g56 pending" id="pill-56">5~6학년 0/2</span>
    </div>
    <span class="week-badge" id="week-badge"></span>
  </div>
</div>

<!-- API 설정 -->
<div class="api-bar">
  <label>🔑 Gemini API Key</label>
  <input type="password" id="api-key" placeholder="AIza... (최초 1회 입력, 자동저장)" oninput="saveApiKey()">
  <span class="api-hint">→ <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com</a> 에서 무료 발급</span>
</div>

<!-- 데이터 소스 -->
<div class="source-bar">
  <div class="source-tabs">
    <button class="source-tab active" id="tab-sheets" onclick="switchTab('sheets')">📊 구글 시트</button>
    <button class="source-tab" id="tab-xlsx" onclick="switchTab('xlsx')">📂 엑셀 파일</button>
  </div>
  <div class="source-input-wrap" id="source-sheets">
    <input class="source-input" id="sheets-url" placeholder=""파일 → 공유 → 웹에 게시 → CSV" 로 생성된 URL 붙여넣기" oninput="saveSheetsUrl()">
    <button class="btn-load" onclick="loadGoogleSheets()">불러오기</button>
  </div>
  <div class="source-input-wrap" id="source-xlsx" style="display:none">
    <button class="btn-load" style="background:#6B7280" onclick="document.getElementById('xlsx-input').click()">파일 선택</button>
    <input type="file" id="xlsx-input" accept=".xlsx" style="display:none" onchange="loadXlsx(this)">
  </div>
  <span id="source-status" class="source-status"></span>
</div>

<!-- 테마 + 메일 생성 -->
<div class="action-bar">
  <div class="theme-wrap">
    <label>이번 주 테마</label>
    <input class="theme-input" type="text" id="theme-input" placeholder="예: 도전과 용기, 환경 보호, 우정..." oninput="state.theme=this.value">
  </div>
  <button class="btn-generate-mail" id="btn-mail" disabled onclick="generateMail()">📧 공지 메일 생성</button>
</div>

<!-- 메인 -->
<div class="main">
  <div class="grade-grid" id="grade-grid"></div>
  <div id="mail-wrap" style="display:none">
    <div class="mail-section">
      <div class="mail-header">
        <h3>✉️ 공지 메일</h3>
        <button class="btn-copy" onclick="copyMail()">복사</button>
      </div>
      <div class="mail-body" id="mail-body"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>

function getWeekStr() {
  const d = new Date();
  const start = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil(((d - start) / 86400000 + start.getDay() + 1) / 7);
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${week}주차`;
}
function shuffle(a) {
  const b = [...a];
  for (let i = b.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [b[i],b[j]]=[b[j],b[i]]; }
  return b;
}

// ── 구글 시트 CSV 로드 ──────────────────────────────────
function parseCSV(text) {
  const rows = [];
  const lines = text.split('\n');
  for (const line of lines) {
    const row = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { row.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    row.push(cur.trim());
    rows.push(row);
  }
  return rows;
}

async function loadGoogleSheets() {
  const url = document.getElementById('sheets-url').value.trim();
  const statusEl = document.getElementById('source-status');

  if (!url) { alert('구글 시트 CSV 게시 URL을 입력해주세요.'); return; }

  statusEl.textContent = '⏳ 불러오는 중...';
  statusEl.className = 'source-status';

  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('URL에 접근할 수 없습니다. 게시 설정을 확인해주세요.');
    const text = await resp.text();
    if (!text || text.includes('<html')) throw new Error('CSV 데이터를 읽을 수 없습니다. CSV 형식으로 게시했는지 확인해주세요.');

    const rows = parseCSV(text);
    const nd = { g12: [], g34: [], g56: [] };

    // 헤더 찾기 (계약 업체가 있는 행)
    let startRow = 0;
    for (let i = 0; i < rows.length; i++) {
      if (rows[i].some(c => c.includes('서비스여부') || c.includes('운영중'))) {
        startRow = i + 1;
        break;
      }
    }

    for (let i = startRow; i < rows.length; i++) {
      const r = rows[i];
      if (!r || r.length < 8) continue;
      if (String(r[6]||'').trim() !== '운영중') continue;
      if (!['공통','초등'].includes(String(r[7]||'').trim())) continue;
      const item = { s: String(r[2]||'').trim(), t: String(r[4]||'').trim(), c: String(r[1]||'').trim() };
      if (!item.t || !item.s) continue;
      const has = col => String(r[col]||'').trim() === '●';
      if (has(9)||has(10)) nd.g12.push(item);
      if (has(11)||has(12)) nd.g34.push(item);
      if (has(13)||has(14)) nd.g56.push(item);
    }

    const total = nd.g12.length + nd.g34.length + nd.g56.length;
    if (!total) throw new Error('콘텐츠를 불러오지 못했습니다. 올바른 시트인지 확인해주세요.');

    state.contentData = nd;
    state.selected = { g12: [], g34: [], g56: [] };
    statusEl.textContent = `✅ ${total.toLocaleString()}개 콘텐츠 로드됨`;
    statusEl.className = 'source-status';
    renderAll();

  } catch(e) {
    statusEl.textContent = '❌ ' + e.message;
    statusEl.className = 'source-status error';
  }
}

// ── xlsx 로드 ──────────────────────────────────
function loadXlsx(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      const sn = wb.SheetNames.find(n => n.includes('글로벌리더십') && n.includes('전체'));
      if (!sn) { alert("'2024~ 글로벌리더십(전체리스트)' 시트를 찾을 수 없습니다."); return; }
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[sn], { header: 1, defval: '' });
      const nd = { g12: [], g34: [], g56: [] };
      for (let i = 3; i < rows.length; i++) {
        const r = rows[i];
        if (String(r[6]||'').trim() !== '운영중') continue;
        if (!['공통','초등'].includes(String(r[7]||'').trim())) continue;
        const item = { s: String(r[2]||'').trim(), t: String(r[4]||'').trim(), c: String(r[1]||'').trim() };
        if (!item.t || !item.s) continue;
        const has = col => String(r[col]||'').trim() === '●';
        if (has(9)||has(10)) nd.g12.push(item);
        if (has(11)||has(12)) nd.g34.push(item);
        if (has(13)||has(14)) nd.g56.push(item);
      }
      const total = nd.g12.length + nd.g34.length + nd.g56.length;
      if (!total) { alert('콘텐츠를 불러오지 못했습니다.'); return; }
      state.contentData = nd;
      state.selected = { g12: [], g34: [], g56: [] };
      const row = document.getElementById('upload-row');
      row.className = 'upload-row upload-done';
      document.getElementById('upload-text').textContent = `✅ ${total.toLocaleString()}개 콘텐츠 로드됨`;
      renderAll();
    } catch(err) { alert('파일 오류: ' + err.message); }
  };
  reader.readAsArrayBuffer(file);
}

// ── Gemini 호출 ──────────────────────────────────
async function callGemini(prompt) {
  const key = getApiKey();
  if (!key) { alert('Gemini API 키를 먼저 입력해주세요.'); return null; }
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;
  const resp = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
  });
  const data = await resp.json();
  if (data.error) throw new Error(data.error.message);
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
}

async function aiRecommend(gradeKey) {
  const theme = state.theme.trim();
  if (!theme) { alert('이번 주 테마를 먼저 입력해주세요!'); return; }
  if (!getApiKey()) { alert('Gemini API 키를 먼저 입력해주세요.'); return; }

  state.aiLoading[gradeKey] = true;
  renderGradeCard(gradeKey);

  const grade = GRADES.find(g => g.key === gradeKey);
  const pool = state.contentData[gradeKey];
  // 다른 학년에서 이미 선택된 콘텐츠 제외
  const otherSelected = Object.entries(state.selected)
    .filter(([k]) => k !== gradeKey)
    .flatMap(([, items]) => items.map(i => i.t));
  const filteredPool = pool.filter(i => !otherSelected.includes(i.t));
  const sample = shuffle(filteredPool).slice(0, 50);
  const list = sample.map((item, i) => `${i+1}. [${item.c}] ${item.s} — ${item.t}`).join('\n');

  const prompt = `당신은 초등학교 교육 콘텐츠 큐레이터입니다.
이번 주 테마: "${theme}"
대상 학년: ${grade.label}

아래 콘텐츠 목록 중 이번 주 테마와 가장 잘 어울리는 콘텐츠 2개를 선택하고, 각각 소개글을 작성해주세요.

소개글 규칙:
- 1~2문장으로 작성
- 문장 안에 "함께"를 자연스럽게 포함할 것
- "홈런프렌즈" 라는 단어는 절대 사용 금지
- 콘텐츠 내용을 구체적으로 언급하면서 흥미를 유발할 것
- 예시1: "대한민국의 국화인 무궁화에 대해 알아보고 그 의미를 함께 생각해봅니다."
- 예시2: "추운 겨울 동안 어떤 동물들이 긴 잠을 자는지 함께 알아봅니다."
- 예시3: "재미있는 이야기와 함께 사자성어 '유비무환'의 의미를 알아봅니다."
- 예시4: "어린 시절부터 엄마의 장애를 이해하고 보듬었던 고등학생 아들의 이야기를 함께 살펴봅니다."
- 예시5: "전기 콘센트의 구멍은 왜 비스듬한 것일까? 그 이유를 과학적으로 함께 접근해봅니다."

콘텐츠 목록:
${list}

반드시 아래 JSON 형식으로만 응답하세요. 다른 텍스트는 절대 포함하지 마세요:
{"picks":[{"index":번호,"desc":"소개글"},{"index":번호,"desc":"소개글"}]}`;

  try {
    const text = await callGemini(prompt);
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    const newSel = [];
    for (const p of parsed.picks) {
      const item = sample[p.index - 1];
      if (item) newSel.push({ ...item, desc: p.desc });
    }
    state.selected[gradeKey] = newSel.slice(0, 2);
  } catch(e) {
    alert('AI 추천 중 오류가 발생했습니다: ' + e.message);
  }

  state.aiLoading[gradeKey] = false;
  renderAll();
}

// ── 선택/해제 ──────────────────────────────────
function selectItem(gradeKey, idx) {
  if (state.selected[gradeKey].length >= 2) {
    alert(GRADES.find(g=>g.key===gradeKey).label + '은 최대 2개까지 선택 가능합니다.');
    return;
  }
  const pool = getFilteredPool(gradeKey);
  const item = pool[idx];
  if (!item) return;
  if (state.selected[gradeKey].some(s => s.t === item.t)) return;
  state.selected[gradeKey] = [...state.selected[gradeKey], { ...item, desc: '' }];
  renderAll();
}
function removeItem(gradeKey, idx) {
  state.selected[gradeKey] = state.selected[gradeKey].filter((_,i) => i !== idx);
  renderAll();
}
function updateDesc(gradeKey, idx, val) {
  if (state.selected[gradeKey][idx]) state.selected[gradeKey][idx].desc = val;
}

// ── 필터링 ──────────────────────────────────
function getFilteredPool(gradeKey) {
  const kw = state.search[gradeKey].trim();
  const pool = state.contentData[gradeKey] || [];
  return kw ? pool.filter(i => i.t.includes(kw) || i.s.includes(kw) || i.c.includes(kw)) : pool;
}

// ── 렌더링 ──────────────────────────────────
function renderAll() {
  GRADES.forEach(g => renderGradeCard(g.key));
  renderPills();
  document.getElementById('btn-mail').disabled = !isComplete();
}

function renderPills() {
  GRADES.forEach(g => {
    const cnt = state.selected[g.key].length;
    const el = document.getElementById('pill-' + g.key.slice(1));
    el.textContent = `${g.label} ${cnt}/2`;
    el.className = 'pill ' + g.cls + (cnt === 2 ? ' done' : ' pending');
  });
}

function renderGradeCard(gradeKey) {
  const container = document.getElementById('card-' + gradeKey);
  if (!container) return;
  const grade = GRADES.find(g => g.key === gradeKey);
  const sel = state.selected[gradeKey];
  const loading = state.aiLoading[gradeKey];
  const pool = getFilteredPool(gradeKey);
  const expanded = state.expanded[gradeKey];
  const display = expanded ? pool : pool.slice(0, 30);
  const hasKey = !!getApiKey();
  const hasTheme = !!state.theme.trim();

  // 선택된 항목 HTML
  const selHTML = sel.length === 0
    ? `<p class="empty-selected">아직 선택된 콘텐츠가 없어요</p>`
    : sel.map((item, i) => `
      <div class="selected-item">
        <div class="selected-item-top">
          <div>
            <div class="item-series">${item.c} · ${item.s}</div>
            <div class="selected-item-title">${item.t}</div>
          </div>
          <button class="btn-remove" onclick="removeItem('${gradeKey}',${i})">✕</button>
        </div>
        <textarea class="desc-textarea" placeholder="소개글 (AI가 자동 작성하거나 직접 입력)..."
          oninput="updateDesc('${gradeKey}',${i},this.value)"
        >${item.desc || ''}</textarea>
      </div>`).join('');

  // 콘텐츠 목록 HTML
  const listHTML = display.map((item, i) => {
    const isSel = sel.some(s => s.t === item.t);
    return `<div class="content-item ${isSel ? 'selected-in-list' : ''}"
      onclick="${isSel ? '' : `selectItem('${gradeKey}',${i})`}">
      <div class="topic-dot topic-${item.c}"></div>
      <div class="content-item-right">
        <div class="content-item-title">${item.t}</div>
        <div class="content-item-meta">
          <span class="topic-label topic-${item.c}">${item.c}</span>
          <span>${item.s}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  const moreBtn = pool.length > 30
    ? `<button class="show-more-btn" onclick="toggleExpand('${gradeKey}')">
        ${expanded ? '▲ 접기' : `▼ 전체 보기 (${pool.length.toLocaleString()}개)`}
       </button>`
    : '';

  container.innerHTML = `
    <div class="grade-card-header ${grade.cls}">
      <div class="grade-card-header-top">
        <span class="grade-title">${grade.label}</span>
        <span class="sel-count">${sel.length}/2 선택</span>
      </div>
      <div class="grade-card-header-bottom">
        <input class="search-box" type="text" placeholder="검색..."
          value="${state.search[gradeKey]}"
          oninput="state.search['${gradeKey}']=this.value;renderGradeCard('${gradeKey}')">
        <button class="btn-ai ${loading ? 'loading' : ''}"
          onclick="aiRecommend('${gradeKey}')"
          ${!hasKey || !hasTheme || loading ? 'disabled' : ''}>
          ${loading ? '⏳ 추천 중...' : '✨ AI 추천'}
        </button>
      </div>
    </div>
    <div class="selected-area">
      <div class="selected-area-label">선택된 콘텐츠</div>
      ${selHTML}
    </div>
    <div class="content-list">
      ${listHTML}
      ${moreBtn}
    </div>
    ${loading ? '<div class="loading-overlay">⏳ AI가 추천 중...</div>' : ''}
  `;
}

function toggleExpand(gradeKey) {
  state.expanded[gradeKey] = !state.expanded[gradeKey];
  renderGradeCard(gradeKey);
}

// ── 메일 생성 ──────────────────────────────────
function generateMail() {
  if (!isComplete()) return;
  const week = document.getElementById('week-badge').textContent;
  const theme = state.theme;
  let mail = `[${week}] 내공상자 추천 콘텐츠 안내\n\n`;
  mail += `안녕하세요, 선생님! 😊\n`;
  if (theme) mail += `이번 주 테마는 "${theme}"입니다.\n`;
  mail += `학년별 추천 콘텐츠를 안내드립니다.\n\n`;
  GRADES.forEach(g => {
    mail += `📚 ${g.label}\n`;
    state.selected[g.key].forEach((item, i) => {
      mail += `  ${i+1}. [${item.c}] ${item.s} — ${item.t}\n`;
      if (item.desc) mail += `     ${item.desc}\n`;
    });
    mail += '\n';
  });
  mail += `즐거운 한 주 되세요! 🌟\n내공상자 운영팀 드림`;
  document.getElementById('mail-body').textContent = mail;
  document.getElementById('mail-wrap').style.display = 'block';
  document.getElementById('mail-wrap').scrollIntoView({ behavior: 'smooth' });
}
function copyMail() {
  navigator.clipboard.writeText(document.getElementById('mail-body').textContent).then(() => {
    const btn = document.querySelector('.btn-copy');
    btn.textContent = '✓ 복사됨';
    setTimeout(() => btn.textContent = '복사', 1500);
  });
}

// ── 초기화 ──────────────────────────────────
document.getElementById('week-badge').textContent = getWeekStr();
const savedKey = localStorage.getItem('gemini_key');
if (savedKey) { document.getElementById('api-key').value = savedKey; document.getElementById('api-key').classList.add('ok'); }

// 카드 컨테이너 생성
const grid = document.getElementById('grade-grid');
GRADES.forEach(g => {
  const div = document.createElement('div');
  div.className = 'grade-card ' + g.cls;
  div.id = 'card-' + g.key;
  grid.appendChild(div);
});

renderAll();

// 저장된 구글 시트 URL 복원
const savedUrl = localStorage.getItem('sheets_url');
if (savedUrl) document.getElementById('sheets-url').value = savedUrl;
</script>
